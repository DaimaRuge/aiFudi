version: '3.8'

services:
  backend:
    build: ./backend
    container_name: lifelong-learning-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_db:/app/chroma_db
      - ./backend:/app
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PYTHONPATH=/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - lifelong-network

  frontend:
    build: ./frontend
    container_name: lifelong-learning-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lifelong-network

networks:
  lifelong-network:
    driver: bridge